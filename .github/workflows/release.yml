name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target.name }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: linux-x86_64, zig: x86_64-linux-musl }
          - { name: linux-aarch64, zig: aarch64-linux-musl }
          # - { name: macos-x86_64,  zig: x86_64-macos       }
          - { name: macos-aarch64, zig: aarch64-macos }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build inside vegacandle/zig-builder
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e ZIG_GLOBAL_CACHE_DIR=/app/.zig-cache-global \
            vegacandle/zig-builder:0.15.2 \
            sh -eu -c '
              git config --global --add safe.directory /app
              zig build \
                -Doptimize=ReleaseSafe \
                -Dtarget=${{ matrix.target.zig }} \
                -Dversion=${{ steps.ver.outputs.version }}
            '

      - name: Package
        id: pkg
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCH="${{ matrix.target.name }}"
          ASSET="zmx-${VER}-${ARCH}.tar.gz"
          tar -C zig-out/bin -czf "$ASSET" zmx
          sha256sum "$ASSET" > "${ASSET}.sha256"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: zmx-${{ matrix.target.name }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
