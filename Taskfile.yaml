version: "3"
## =========================================================
## NOTE:
## [2026/05] Fork into naq3/zmx
## - Main stream không build sẵn binary (latest) để download.
## - Fork --> Build by Github Actions.
## - CHANGLOG:
##      + Add Dockerfile.build for multiarch build (amd64 + arm64).
##      + Add .github/workflows/release.yml for CI/CD release automation.
## - RELEASE:
##      + git tag v0.5.2 && git push origin v0.5.2  --> Initial release.
##      + git tag v0.6.1 && git push origin v0.6.1  --> Sync with main stream (18/05/2026).
## =========================================================

tasks:
  default:
    cmds:
      - task --list-all
  ## =============================================
  ## Build base image for builder [RUN Locally]
  ## - task builder-img-build
  builder-img-build:
    cmds:
      - docker buildx create --use --name multiarch 2>/dev/null || true
      - |
        docker buildx build \
          -f Dockerfile.build \
          -t vegacandle/zig-builder:0.15.2 \
          --platform linux/amd64,linux/arm64 \
          --push \
          .
  builder-img-push:
    cmds:
      - echo "Image đã được push trong builder-img-build (buildx --push)"
  builder-img-test:
    cmds:
      - docker run --rm -it -v "$(pwd)":/app alpine:3.23 sh
  ## =============================================
  ## FOR TEST --> IF OKE --> PUSH TAG & BUILD BY GITHUB ACTIONS
  local-build:
    cmds:
      - docker run --rm -it -v "$(pwd)":/app vegacandle/zig-builder:0.15.2 sh -c "zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos"
  local-download:
    dir: /tmp
    cmds:
      # - cd /tmp
      # - curl -L -o zmx-0.5.2-macos-aarch64.tar.gz https://github.com/naq3/zmx/releases/download/v0.5.2/zmx-0.5.2-macos-aarch64.tar.gz
      # - tar -xvzf zmx-0.5.2-macos-aarch64.tar.gz
      # - ./zmx --version
      # - mv zmx /usr/local/bin/zmx
